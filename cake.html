<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>After 8 — Store</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0D0F1A; --surface:#161827; --card:#1E2035; --border:#2A2D45;
    --accent:#FF6B35; --gold:#F5C842; --text:#F0EDE6; --muted:#8B8FA8;
    --danger:#FF4560; --radius:14px;
  }
  html,body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overscroll-behavior:none; }

  /* Header */
  .header { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:14px 16px 10px; }
  .header-top { display:flex; align-items:center; justify-content:space-between; }
  .brand { display:flex; align-items:center; gap:8px; }
  .brand-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.4)} }
  .brand-name { font-family:'Playfair Display',serif; font-size:18px; }
  .brand-sub  { font-size:11px; color:var(--muted); margin-top:1px; }
  .cart-btn {
    position:relative; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 12px; cursor:pointer;
    display:flex; align-items:center; gap:6px; color:var(--text); font-size:14px;
  }
  .cart-badge {
    position:absolute; top:-6px; right:-6px;
    background:var(--accent); color:#fff; font-size:10px; font-weight:600;
    border-radius:50%; width:18px; height:18px;
    display:none; align-items:center; justify-content:center;
  }
  .cart-badge.visible { display:flex; }

  /* Tabs */
  .tabs { display:flex; gap:8px; padding:14px 16px 0; overflow-x:auto; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab {
    flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s;
  }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  /* Grid */
  .section-title { padding:18px 16px 10px; font-family:'Playfair Display',serif; font-size:16px; color:var(--muted); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:0 16px; }

  .card {
    background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
    overflow:hidden; cursor:pointer; transition:border-color .2s,transform .15s; position:relative;
  }
  .card:active { transform:scale(.97); }
  .card.in-cart { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent)44; }

  /* SVG visual face */
  .card-face {
    width:100%; height:0; padding-bottom:100%;
    position:relative; overflow:hidden;
  }
  .card-face svg {
    position:absolute; top:0; left:0; width:100%; height:100%;
  }

  .card-body { padding:10px 11px 12px; }
  .card-name { font-family:'Playfair Display',serif; font-size:14px; line-height:1.3; margin-bottom:3px; }
  .card-desc { font-size:11px; color:var(--muted); line-height:1.4; margin-bottom:8px; }
  .card-footer { display:flex; align-items:center; justify-content:space-between; }
  .card-price { font-size:15px; font-weight:700; color:var(--accent); }

  .bestseller-tag {
    position:absolute; top:8px; left:8px; z-index:2;
    background:var(--gold); color:#000; font-size:9px; font-weight:700;
    padding:3px 7px; border-radius:5px; text-transform:uppercase; letter-spacing:.5px;
  }

  .add-btn {
    width:30px; height:30px; border-radius:8px;
    background:var(--accent); border:none; color:#fff;
    font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .1s;
  }
  .add-btn:active { transform:scale(.9); }
  .qty-ctrl { display:flex; align-items:center; gap:6px; }
  .qty-btn {
    width:26px; height:26px; border-radius:7px; border:1px solid var(--border);
    background:var(--surface); color:var(--text); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .qty-num { font-size:14px; font-weight:600; min-width:16px; text-align:center; }

  /* Cart Drawer */
  .drawer-overlay { position:fixed; inset:0; background:#00000088; z-index:200; opacity:0; pointer-events:none; transition:opacity .25s; }
  .drawer-overlay.open { opacity:1; pointer-events:all; }
  .drawer {
    position:fixed; bottom:0; left:0; right:0; z-index:201;
    background:var(--surface); border-radius:20px 20px 0 0;
    border-top:1px solid var(--border); padding:0 0 env(safe-area-inset-bottom,16px);
    transform:translateY(100%); transition:transform .3s cubic-bezier(.32,1,.24,1);
    max-height:80vh; display:flex; flex-direction:column;
  }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:12px auto 0; }
  .drawer-header { padding:14px 16px 10px; font-family:'Playfair Display',serif; font-size:18px; border-bottom:1px solid var(--border); }
  .drawer-items { overflow-y:auto; flex:1; padding:12px 16px; display:flex; flex-direction:column; gap:10px; }

  .cart-item { display:flex; align-items:center; gap:12px; }
  .cart-item-icon { font-size:26px; width:44px; height:44px; background:var(--card); border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .cart-item-info { flex:1; }
  .cart-item-name { font-size:14px; font-weight:500; }
  .cart-item-price { font-size:12px; color:var(--muted); margin-top:2px; }
  .cart-item-remove { background:none; border:none; color:var(--danger); font-size:18px; cursor:pointer; padding:4px; }

  .delivery-form { padding:12px 16px; border-top:1px solid var(--border); }
  .form-label { font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:500; }
  .form-input {
    width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; transition:border-color .2s;
  }
  .form-input:focus { border-color:var(--accent); }
  .form-row { display:flex; gap:10px; margin-top:10px; }
  .form-row .form-group { flex:1; }
  .form-group { display:flex; flex-direction:column; }

  .drawer-footer { padding:12px 16px; border-top:1px solid var(--border); }
  .total-row { display:flex; justify-content:space-between; margin-bottom:12px; }
  .total-label { font-size:14px; color:var(--muted); }
  .total-amount { font-family:'Playfair Display',serif; font-size:20px; color:var(--gold); }
  .checkout-btn {
    width:100%; padding:14px; border-radius:12px; border:none;
    background:var(--accent); color:#fff; font-size:16px; font-weight:600;
    cursor:pointer; font-family:'DM Sans',sans-serif;
  }
  .checkout-btn:disabled { opacity:.5; cursor:not-allowed; }
  .empty-cart { text-align:center; padding:40px 20px; color:var(--muted); }
  .empty-cart-icon { font-size:48px; margin-bottom:12px; }
  .bottom-space { height:100px; }

  /* Float bar */
  .float-bar {
    position:fixed; bottom:16px; left:16px; right:16px; z-index:150;
    background:var(--accent); border-radius:14px;
    padding:14px 18px; display:flex; align-items:center; justify-content:space-between;
    transform:translateY(120px); transition:transform .3s cubic-bezier(.32,1,.24,1);
    box-shadow:0 8px 32px #FF6B3544;
  }
  .float-bar.visible { transform:translateY(0); }
  .float-bar-left { display:flex; flex-direction:column; }
  .float-bar-items { font-size:12px; opacity:.85; }
  .float-bar-total { font-size:18px; font-weight:700; }
  .float-bar-btn { background:#fff; color:var(--accent); border:none; border-radius:10px; padding:8px 16px; font-weight:700; font-size:14px; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-name">After 8 🛒</div>
        <div class="brand-sub">Late night delivery · Room to room</div>
      </div>
    </div>
    <button class="cart-btn" onclick="openDrawer()">
      🛒 Cart <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="filterCategory('all',this)">All</button>
  <button class="tab" onclick="filterCategory('snacks',this)">🥪 Snacks</button>
  <button class="tab" onclick="filterCategory('colddrinks',this)">🥤 Drinks</button>
  <button class="tab" onclick="filterCategory('cake',this)">🎂 Cakes</button>
  <button class="tab" onclick="filterCategory('party',this)">🎉 Party</button>
  <button class="tab" onclick="filterCategory('combo',this)">🎁 Combos</button>
</div>

<div class="section-title" id="sectionTitle">All items</div>
<div class="grid" id="productGrid"></div>
<div class="bottom-space"></div>

<div class="float-bar" id="floatBar">
  <div class="float-bar-left">
    <span class="float-bar-items" id="floatItems">0 items</span>
    <span class="float-bar-total" id="floatTotal">₹0</span>
  </div>
  <button class="float-bar-btn" onclick="openDrawer()">View Cart →</button>
</div>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>
  <div class="drawer-header">Your Order 🛒</div>
  <div class="drawer-items" id="drawerItems"></div>
  <div class="delivery-form">
    <div class="form-group">
      <div class="form-label">Room Number *</div>
      <input class="form-input" id="roomNumber" type="text" placeholder="e.g. A-204" maxlength="10"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <div class="form-label">Your Name *</div>
        <input class="form-input" id="recipientName" type="text" placeholder="Name"/>
      </div>
      <div class="form-group">
        <div class="form-label">Delivery Time</div>
        <input class="form-input" id="deliveryTime" type="text" placeholder="e.g. 10 PM"/>
      </div>
    </div>
    <div class="form-group" style="margin-top:10px;display:none" id="cakeMsgGroup">
      <div class="form-label">Message on cake (optional)</div>
      <input class="form-input" id="cakeMessage" type="text" placeholder="Happy Birthday Rahul! 🎉" maxlength="40"/>
    </div>
  </div>
  <div class="drawer-footer">
    <div class="total-row">
      <span class="total-label">Total (incl. ₹30 delivery)</span>
      <span class="total-amount" id="drawerTotal">₹0</span>
    </div>
    <button class="checkout-btn" id="checkoutBtn" onclick="checkout()">Pay via UPI →</button>
  </div>
</div>

  { id:"co2", name:"Royal Combo",      desc:"½ kg cake + full decoration kit",         price:549, category:"combo",      bestseller:false, svgKey:"royalcombo",   emoji:"👑" },
  { id:"co3", name:"Snack Attack",     desc:"2× Samosa + 2× Vada Pav + 2× Coca-Cola", price:130, category:"combo",      bestseller:false, svgKey:"snackattack",  emoji:"🎯" },

];

const DELIVERY_FEE = 30;
const SECTION_LABELS = {
  all:"All items", snacks:"🥪 Snacks", colddrinks:"🥤 Cold Drinks",
  cake:"🎂 Cakes", party:"🎉 Party Accessories", combo:"🎁 Combos",
};

let cart = {};
let currentCategory = "all";

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.BackButton.show(); tg.BackButton.onClick(()=>tg.close()); }

function renderProducts() {
  const grid = document.getElementById("productGrid");
  const filtered = currentCategory === "all" ? PRODUCTS : PRODUCTS.filter(p=>p.category===currentCategory);
  document.getElementById("sectionTitle").textContent = SECTION_LABELS[currentCategory] || "All items";

  grid.innerHTML = filtered.map(p => {
    const inCart = (cart[p.id]||0) > 0;
    const qty    = cart[p.id] || 0;
    const face   = SVG[p.svgKey]
      ? `<div class="card-face">${SVG[p.svgKey]}</div>`
      : `<div class="card-face" style="background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:52px;padding-bottom:0;height:120px">${p.emoji}</div>`;

    return `
    <div class="card ${inCart?"in-cart":""}" id="card-${p.id}">
      ${p.bestseller ? '<div class="bestseller-tag">⭐ Popular</div>' : ""}
      ${face}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-footer">
          <div class="card-price">₹${p.price}</div>
          ${qty === 0
            ? `<button class="add-btn" onclick="addToCart('${p.id}')">+</button>`
            : `<div class="qty-ctrl">
                 <button class="qty-btn" onclick="changeQty('${p.id}',-1)">−</button>
                 <span class="qty-num">${qty}</span>
                 <button class="qty-btn" onclick="changeQty('${p.id}',1)">+</button>
               </div>`
          }
        </div>
      </div>
    </div>`;
  }).join("");
}

function filterCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");
  renderProducts();
}

function addToCart(id) { cart[id] = 1; updateUI(); }
function changeQty(id, delta) {
  cart[id] = (cart[id]||0) + delta;
  if (cart[id] <= 0) delete cart[id];
  updateUI();
}

function getCartTotal() {
  let t = 0;
  for (const [id,qty] of Object.entries(cart)) {
    const p = PRODUCTS.find(x=>x.id===id);
    if (p) t += p.price * qty;
  }
  if (Object.keys(cart).length > 0) t += DELIVERY_FEE;
  return t;
}
function getCartCount() { return Object.values(cart).reduce((s,v)=>s+v,0); }

function updateUI() {
  renderProducts();
  const count = getCartCount();
  const badge = document.getElementById("cartBadge");
  badge.textContent = count;
  count > 0 ? badge.classList.add("visible") : badge.classList.remove("visible");
  const bar = document.getElementById("floatBar");
  document.getElementById("floatItems").textContent = `${count} item${count!==1?"s":""}`;
  document.getElementById("floatTotal").textContent  = `₹${getCartTotal()}`;
  count > 0 ? bar.classList.add("visible") : bar.classList.remove("visible");
  const hasCake = Object.keys(cart).some(id=>id.startsWith("ca")||id.startsWith("co"));
  document.getElementById("cakeMsgGroup").style.display = hasCake ? "flex" : "none";
  if (document.getElementById("drawer").classList.contains("open")) renderDrawerItems();
}

function openDrawer() {
  renderDrawerItems();
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("open");
}
function renderDrawerItems() {
  const container = document.getElementById("drawerItems");
  const items = Object.entries(cart).map(([id,qty])=>{
    const p = PRODUCTS.find(x=>x.id===id);
    return p ? {...p, qty} : null;
  }).filter(Boolean);

  if (!items.length) {
    container.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div><div>Cart is empty.<br/>Pick something above!</div></div>`;
  } else {
    container.innerHTML = items.map(item=>`
      <div class="cart-item">
        <div class="cart-item-icon">${item.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}${item.qty>1?` × ${item.qty}`:""}</div>
          <div class="cart-item-price">₹${item.price * item.qty}</div>
        </div>
        <button class="cart-item-remove" onclick="changeQty('${item.id}',-99)">✕</button>
      </div>`).join("") + `
      <div class="cart-item" style="border-top:1px solid var(--border);padding-top:10px;margin-top:4px">
        <div class="cart-item-icon">🛵</div>
        <div class="cart-item-info"><div class="cart-item-name">Delivery</div><div class="cart-item-price">Flat fee</div></div>
        <div style="font-size:14px;font-weight:600;color:var(--muted)">₹${DELIVERY_FEE}</div>
      </div>`;
  }
  document.getElementById("drawerTotal").textContent = `₹${getCartTotal()}`;
  document.getElementById("checkoutBtn").disabled = getCartCount() === 0;
}

function checkout() {
  const room      = document.getElementById("roomNumber").value.trim();
  const recipient = document.getElementById("recipientName").value.trim();
  const time      = document.getElementById("deliveryTime").value.trim();
  const msg       = document.getElementById("cakeMessage").value.trim();
  if (!room)      { alert("Please enter your room number."); return; }
  if (!recipient) { alert("Please enter your name."); return; }

  const payload = {
    service:       "store",
    room, recipient,
    delivery_time: time,
    cake_message:  msg,
    items: Object.entries(cart).map(([id,qty])=>{
      const p = PRODUCTS.find(x=>x.id===id);
      return { id, name:p.name, category:p.category, qty, price:p.price };
    }),
    total:        getCartTotal(),
    delivery_fee: DELIVERY_FEE,
    timestamp:    new Date().toISOString(),
  };
  if (tg) tg.sendData(JSON.stringify(payload));
  else alert("Order JSON:\n"+JSON.stringify(payload,null,2));
}

renderProducts();
</script>
